<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | CodeAlpha Store</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Animate.css -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <!-- Animated Background -->
    <div class="bg-blur blob1"></div>
    <div class="bg-blur blob2"></div>
    <div class="bg-blur blob3"></div>

    <div class="container-fluid min-vh-100">

        <div class="row min-vh-100 align-items-center">

            <!-- LEFT SIDE -->
            <div class="col-lg-6 d-none d-lg-flex">

                <div class="branding">

                    <div class="logo-circle">
                        <i class="bi bi-bag-heart-fill"></i>
                    </div>

                    <h1>CodeAlpha Store</h1>

                    <p>
                        Premium Shopping Experience
                    </p>

                    <ul>

                        <li>
                            <i class="bi bi-check-circle-fill"></i>
                            Fast Delivery
                        </li>

                        <li>
                            <i class="bi bi-check-circle-fill"></i>
                            Trusted Products
                        </li>

                    </ul>

                </div>

            </div>

            <!-- RIGHT SIDE -->

            <div class="col-lg-6">

                <div class="form-box glass-card animate__animated animate__fadeInUp">

                    <div class="text-center mb-4">

                        <h2>Welcome Back 👋</h2>

                        <p class="subtitle">
                            Login to continue shopping
                        </p>

                    </div>

                    <form id="loginForm">

                        <div class="input-group mb-4">

                            <span class="input-group-text">
                                <i class="bi bi-envelope-fill"></i>
                            </span>

                            <input
                                type="email"
                                id="loginEmail"
                                class="form-control"
                                placeholder="Email Address"
                                required>

                        </div>

                        <div class="input-group mb-3">

                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>

                            <input
                                type="password"
                                id="loginPassword"
                                class="form-control"
                                placeholder="Password"
                                required>

                            <span
                                class="input-group-text togglePassword">

                                <i class="bi bi-eye"></i>

                            </span>

                        </div>

                        <div class="d-flex justify-content-between mb-4">

                            <div class="form-check">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="remember">

                                <label
                                    class="form-check-label"
                                    for="remember">

                                    Remember Me

                                </label>

                            </div>

                            <a href="#" class="forgot-link">

                                Forgot Password?

                            </a>

                        </div>

                        <button
                            type="submit"
                            class="btn login-btn w-100">

                            Login

                        </button>

                        <div class="divider">

                            <span>OR</span>

                        </div>

            

                        <p class="login-link mt-4">

                            Don't have an account?

                            <a href="register.html">

                                Create One

                            </a>

                        </p>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/auth.js"></script>
    <script src="js/auth-animation.js"></script>

</body>

</html>
