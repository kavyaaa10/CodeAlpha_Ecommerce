<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | CodeAlpha Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/auth.css">

</head>

<body>

    <!-- Background -->
    <div class="bg-blur blob1"></div>
    <div class="bg-blur blob2"></div>
    <div class="bg-blur blob3"></div>

    <div class="container-fluid">

        <div class="row min-vh-100 align-items-center">

            <!-- Left Side -->
            <div class="col-lg-6 d-none d-lg-flex">

                <div class="branding">

                    <div class="logo-circle">
                        <i class="bi bi-bag-heart-fill"></i>
                    </div>

                    <h1>Create Your Account</h1>

                    <p>
                        Join CodeAlpha Store and enjoy secure shopping,
                        premium products and fast delivery.
                    </p>

                    <ul>

                        <li>
                            <i class="bi bi-check-circle-fill"></i>
                            Secure Payments
                        </li>

                        <li>
                            <i class="bi bi-check-circle-fill"></i>
                            Premium Products
                        </li>

                        <li>
                            <i class="bi bi-check-circle-fill"></i>
                            Fast Delivery
                        </li>

                    </ul>

                </div>

            </div>

            <!-- Right Side -->
            <div class="col-lg-6">

                <div class="glass-card">

                    <h2>Create Account</h2>

                    <p class="subtitle mb-4">
                        Register and start shopping today.
                    </p>

                    <form id="registerForm">

                        <!-- Name -->

                        <div class="input-group mb-3">

                            <span class="input-group-text">

                                <i class="bi bi-person"></i>

                            </span>

                            <input
                                type="text"
                                id="name"
                                class="form-control"
                                placeholder="Full Name"
                                required>

                        </div>

                        <!-- Email -->

                        <div class="input-group mb-3">

                            <span class="input-group-text">

                                <i class="bi bi-envelope"></i>

                            </span>

                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                placeholder="Email Address"
                                required>

                        </div>

                        <!-- Phone -->

                        <div class="input-group mb-3">

                            <span class="input-group-text">

                                <i class="bi bi-phone"></i>

                            </span>

                            <input
                                type="text"
                                id="phone"
                                class="form-control"
                                placeholder="Phone Number"
                                required>

                        </div>

                        <!-- Password -->

                        <div class="input-group mb-2">

                            <span class="input-group-text">

                                <i class="bi bi-lock"></i>

                            </span>

                            <input
                                type="password"
                                id="password"
                                class="form-control"
                                placeholder="Password"
                                required>

                            <span class="input-group-text togglePassword">

                                <i class="bi bi-eye"></i>

                            </span>

                        </div>

                        <div class="password-strength">
                            <div class="strength-bar"></div>
                        </div>

                        <small id="strengthText">
                            Password Strength
                        </small>

                        <!-- Confirm Password -->

                        <div class="input-group mt-3 mb-2">

                            <span class="input-group-text">

                                <i class="bi bi-shield-lock"></i>

                            </span>

                            <input
                                type="password"
                                id="confirmPassword"
                                class="form-control"
                                placeholder="Confirm Password"
                                required>

                            <span class="input-group-text togglePassword">

                                <i class="bi bi-eye"></i>

                            </span>

                        </div>

                        <small id="passwordMatch"></small>

                        <!-- Terms -->

                        <div class="form-check mt-3 mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="terms"
                                required>

                            <label class="form-check-label" for="terms">

                                I agree to the
                                <a href="#">Terms & Conditions</a>

                            </label>

                        </div>

                        <button
                            type="submit"
                            class="btn login-btn w-100">

                            Create Account

                        </button>

                    </form>

                    <div class="divider">

                        <span>OR</span>

                    </div>

                    <button
                        type="button"
                        class="btn google-btn w-100">

                        <i class="bi bi-google"></i>

                        Continue with Google

                    </button>

                    <p class="login-link">

                        Already have an account?

                        <a href="login.html">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="js/auth.js"></script>
    <script src="js/auth-animation.js"></script>

</body>

</html>
